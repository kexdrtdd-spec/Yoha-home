<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yoha</title>
    <style>
        /* จัดโครงสร้างหน้าเว็บทั้งหมดให้อยู่ตรงกลาง */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            position: relative;
        }

        /* จัดตำแหน่งหัวข้อ yoha ให้อยู่มุมซ้ายบนเหมือนในรูป */
        .header-title {
            position: absolute;
            top: 20px;
            left: 20px;
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ตกแต่งกล่องพิมพ์ข้อความ (Input) ทั้งสองกล่อง */
        input[type="text"] {
            width: 300px;
            padding: 12px 20px;
            margin: 10px 0;
            font-size: 18px;
            border: 2px solid #1a2a3a;
            border-radius: 50px; /* ทำให้กล่องโค้งมนรีเหมือนวงรี */
            outline: none;
            box-sizing: border-box;
        }

        /* จัดกลุ่มองค์ประกอบเพื่อให้ปุ่มอยู่ข้างๆ กล่องพิมพ์ได้ */
        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ตกแต่งปุ่มกด (Button) */
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ffffff;
            border: 2px solid #1a2a3a;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #1a2a3a;
            color: white;
        }

        /* จัดการขนาดและการเว้นระยะของโลโก้รูปภาพตรงกลาง */
        .logo-image {
            width: 150px; /* สามารถปรับขนาดเล็กใหญ่ได้ตรงนี้ */
            margin: 20px 0;
        }
    </style>
</head>
<body>


   <img src="logo.png" alt="Yoha Logo" class="logo-image">

   </form>

</body>
</html>
